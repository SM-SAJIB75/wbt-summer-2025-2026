<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
     <title>Create Account Form</title>
    </head>
        <body align="left
      ">
    <body>
 
      <form class="card">

         <div class="card-header">
              <h1>Create your account</h1>
              <p></p>
         </div> 

            <div class="card-body">
  
              <div class="field">
                <label for="name">Full name</label>
                  <br>
                 <input type="text" id="name" placeholder="SM Sojib">
              </div>

            <br>

             <div class="field">
                <label for="age">Age</label>
                <br>
                <input type="number" id="age" placeholder="28">
             </div>
 
            <br>

               <div class="field">
                <label for="dob">Date of birth</label>
                <br>
                <input type="date" id="dob" value="2026-06-25">
              </div>

            <br>

              <div class="field">
                <label for="email">Email address</label>
                <br>
                <input type="email" id="email" placeholder="sojibb@email.com">
            </div>

            <br>

              <div class="field">
                <label for="password">Password</label>
                <br>
                <input type="password" id="password" placeholder="........">
            </div>

            <br>

              <div  class="field" > 
                <label>Preferred contact</label>
                <br>
                <input type="radio" id="email_contact" name="contact" value="email" checked>
                <label for="email_contact">Email</label>
                &nbsp;&nbsp;
                <input type="radio" id="phone_contact" name="contact" value="phone">
                <label for="phone_contact">Phone</label>
                &nbsp;&nbsp;
                <input type="radio" id="sms_contact" name="contact" value="sms">
                <label for="sms_contact">SMS</label>
              </div>

          </div>
        <br>
 
        <div class="card-footer"> 
            <button type="submit">Submit</button>
           &nbsp;&nbsp;&nbsp; 
            <button type="reset">Reset</button>
        </div>

    </form>

</body>
</html>
