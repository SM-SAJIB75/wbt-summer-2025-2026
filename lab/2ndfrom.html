  
  <!DOCTYPE html>
   <html lang="en">
    <head>
    <meta charset="UTF-8">
    <title>Registration Form</title>
</head>
   <body align="Center"></body> 
<body>

    <form class="card">

        <div class="card-header">
            <h1>Registration</h1>
          
            <hr>
        </div>

        <div class="card-body">

            <div class="field">
                <label for="name">Full Name</label>
                <br>
                <input type="text" id="name" placeholder="SM Sojib">
            </div>

            <br>

            <div class="field">
                <label for="postal">Postal Code</label>
                <br>
                <input type="number" id="postal" placeholder="10101">
            </div>

            <br>

            <div class="field">
                <label for="dob">Date of Birth</label>
                <br>
                <input type="date" id="dob" value="2026-06-25">
            </div>

            <br>

            <div class="field">
                <label for="email">Email Address</label>
                <br>
                <input type="email" id="email" placeholder="sardar6150@example.com">
            </div>

            <br>

            <div class="field">
                <label for="password">Password</label>
                <br>
                <input type="password" id="password" placeholder="........">
            </div>

            <br>

            <div class="field">
                <label for="country">Country</label>
                <br>
                <select id="country">
                    <option value="">Select a country...</option>
                    <option value="bd">Bangladesh</option>
                    <option value="us">Usa</option>
                    <option value="uk">Uk</option>
                    <option value="in">Argentina </option>
                    <option value="ca">Brasil </option>
                </select>
            </div>

        </div>

        <br>

        <div class="card-footer">
            <button type="submit">Submit</button>
            &nbsp;&nbsp;&nbsp;
            <button type="reset">Reset</button>
        </div>

    </form>

</body>
</html>
